<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can't Miss List - St. Louis Microsoft Fabric / Power BI Meetup</title>
    <link rel="icon" type="image/png" href="https://debruyn.dev/2023/all-microsoft-fabric-icons-for-diagramming-old-version/Fabric_final_x256.png">
    <style>
        :root {
            --fabric-dark: #09524D;
            --fabric-deep: #1F8C78;
            --fabric-mid: #72F2C3;
            --fabric-light: #9BF2DA;
            --fabric-green: #9BF2A1;
            --pbi-yellow: #F2C811;
            --pbi-yellow-soft: rgba(242, 200, 17, 0.15);
            --surface: #f8fafa;
            --card: #ffffff;
            --text: #1a2e2c;
            --text-muted: #4a6360;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--surface);
            min-height: 100vh;
            color: var(--text);
        }

        .top-bar {
            background: linear-gradient(160deg, #062e2b 0%, var(--fabric-dark) 40%, var(--fabric-deep) 100%);
            padding: 32px 20px 48px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .top-bar::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -15%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(114, 242, 195, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .top-bar-inner {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .back-link {
            display: inline-block;
            color: var(--fabric-mid);
            text-decoration: none;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 16px;
            opacity: 0.8;
            transition: opacity 0.2s ease;
        }

        .back-link:hover { opacity: 1; }
        .back-link::before { content: '\2190  '; }

        .logo-text {
            font-size: 2.4em;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
            margin-bottom: 6px;
        }

        .logo-text span {
            background: linear-gradient(135deg, var(--fabric-mid), var(--fabric-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .meetup-name {
            color: var(--fabric-light);
            font-size: 1em;
            font-weight: 500;
            margin-bottom: 10px;
            opacity: 0.85;
        }

        .meetup-link {
            color: var(--fabric-mid);
            text-decoration: none;
            font-size: 0.85em;
            font-weight: 600;
            border: 1px solid rgba(114, 242, 195, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .meetup-link:hover {
            background: rgba(114, 242, 195, 0.1);
            border-color: var(--fabric-mid);
        }

        .brand-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 14px;
            margin-bottom: 2px;
        }

        .brand-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.75em;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .brand-item.fabric { color: var(--fabric-mid); }
        .brand-item.pbi { color: var(--pbi-yellow); }

        .brand-logo {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }

        .brand-dot {
            color: rgba(255,255,255,0.2);
            font-size: 0.6em;
        }

        .date-badge {
            display: inline-block;
            background: rgba(114, 242, 195, 0.15);
            color: var(--fabric-light);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            margin-top: 16px;
            letter-spacing: 0.3px;
        }

        .month-switcher {
            margin-top: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .month-switcher label {
            color: rgba(155, 242, 218, 0.7);
            font-weight: 600;
            font-size: 0.85em;
        }

        .month-switcher select {
            padding: 6px 14px;
            border: 1px solid rgba(114, 242, 195, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .month-switcher select:hover {
            border-color: var(--fabric-mid);
            background: rgba(255, 255, 255, 0.12);
        }

        .month-switcher select:focus {
            outline: none;
            border-color: var(--fabric-mid);
            box-shadow: 0 0 0 3px rgba(114, 242, 195, 0.15);
        }

        .month-switcher select option {
            background: var(--fabric-dark);
            color: white;
        }

        .main-content {
            max-width: 900px;
            margin: -20px auto 0;
            padding: 0 20px 40px;
            position: relative;
            z-index: 2;
        }

        .section-title {
            color: var(--text-muted);
            font-size: 0.8em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            padding-left: 4px;
        }

        .topics-grid {
            display: grid;
            gap: 16px;
        }

        .topic-card {
            background: var(--card);
            border-radius: 12px;
            padding: 28px 32px;
            border: 1px solid rgba(31, 140, 120, 0.08);
            box-shadow: 0 2px 12px rgba(9, 82, 77, 0.06);
            transition: all 0.25s ease;
            display: flex;
            gap: 24px;
            align-items: flex-start;
            animation: fadeUp 0.4s ease both;
            position: relative;
            overflow: hidden;
        }

        .topic-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--fabric-deep), var(--pbi-yellow), var(--fabric-mid));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .topic-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(9, 82, 77, 0.12);
            border-color: rgba(31, 140, 120, 0.15);
        }

        .topic-card:hover::after { opacity: 1; }

        .topic-number {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--fabric-deep), #25a88e);
            color: white;
            border-radius: 10px;
            text-align: center;
            line-height: 36px;
            font-weight: 700;
            font-size: 0.9em;
            border-bottom: 3px solid var(--pbi-yellow);
        }

        .topic-body { flex: 1; }

        .topic-title {
            color: var(--fabric-dark);
            font-size: 1.15em;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .topic-description {
            color: var(--text-muted);
            line-height: 1.65;
            margin-bottom: 14px;
            font-size: 0.92em;
        }

        .topic-link {
            display: inline-block;
            color: var(--fabric-deep);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85em;
            transition: all 0.2s ease;
        }

        .topic-link:hover {
            color: var(--fabric-dark);
            transform: translateX(4px);
        }

        .topic-link::after {
            content: ' \2192';
        }

        footer {
            text-align: center;
            padding: 32px 20px;
            background: #062e2b;
            color: rgba(155, 242, 218, 0.5);
            font-size: 0.85em;
        }

        footer a {
            color: var(--fabric-mid);
            text-decoration: none;
            font-weight: 600;
        }

        footer a:hover { text-decoration: underline; }

        .error-message {
            text-align: center;
            padding: 40px;
            color: #d32f2f;
        }

        @media (max-width: 768px) {
            .logo-text { font-size: 1.8em; }
            .top-bar { padding: 24px 20px 40px; }
            .topic-card { flex-direction: column; gap: 12px; padding: 20px; }
            .month-switcher { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-inner">
            <a href="index.html" class="back-link">Back to Archive</a>
            <div class="logo-text">Can't <span>Miss</span> List</div>
            <div class="meetup-name">St. Louis Microsoft Fabric / Power BI Meetup</div>
            <a href="https://www.meetup.com/saint-louis-microsoft-fabric-power-bi-meetup-group/" 
               class="meetup-link" 
               target="_blank" 
               rel="noopener noreferrer">
                Visit Our Meetup Group &rarr;
            </a>
            <div class="brand-bar">
                <div class="brand-item fabric">
                    <img src="https://debruyn.dev/2023/all-microsoft-fabric-icons-for-diagramming-old-version/Fabric_final_x256.png" alt="Microsoft Fabric" class="brand-logo">
                    Fabric
                </div>
                <span class="brand-dot">&bull;</span>
                <div class="brand-item pbi">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/New_Power_BI_Logo.svg/1280px-New_Power_BI_Logo.svg.png" alt="Power BI" class="brand-logo">
                    Power BI
                </div>
            </div>
            <div id="date-badge" class="date-badge">Loading...</div>
            <div class="month-switcher">
                <label for="month-select">Switch edition:</label>
                <select id="month-select">
                    <option value="">Loading...</option>
                </select>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div id="topics-grid" class="topics-grid">
            <div class="error-message">Loading monthly items...</div>
        </div>
    </div>

    <footer>
        <p>
            Curated with care for the 
            <a href="https://www.meetup.com/saint-louis-microsoft-fabric-power-bi-meetup-group/" 
               target="_blank" 
               rel="noopener noreferrer">
                St. Louis Microsoft Fabric / Power BI Community
            </a>
        </p>
    </footer>
    <script>
        // HTML escape function to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Get month from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        let selectedMonth = urlParams.get('month');

        // Load and display monthly items
        fetch('monthly-items.json')
            .then(response => {
                if (!response.ok) throw new Error('Failed to load monthly items');
                return response.json();
            })
            .then(data => {
                if (data.length === 0) {
                    document.getElementById('topics-grid').innerHTML = `
                        <div class="error-message">No monthly items available.</div>
                    `;
                    return;
                }

                // If no month selected, use the first (current) month
                if (!selectedMonth) {
                    selectedMonth = data[0].month;
                }

                // Populate month selector
                const monthSelect = document.getElementById('month-select');
                monthSelect.innerHTML = data.map(monthData => 
                    `<option value="${escapeHtml(monthData.month)}" ${monthData.month === selectedMonth ? 'selected' : ''}>
                        ${escapeHtml(monthData.month)}
                    </option>`
                ).join('');

                // Add change listener to month selector
                monthSelect.addEventListener('change', (e) => {
                    const newMonth = e.target.value;
                    window.location.href = `month.html?month=${encodeURIComponent(newMonth)}`;
                });

                // Find and display selected month
                const monthData = data.find(m => m.month === selectedMonth);
                if (!monthData) {
                    document.getElementById('topics-grid').innerHTML = `
                        <div class="error-message">Selected month not found.</div>
                    `;
                    return;
                }

                // Update date badge
                document.getElementById('date-badge').textContent = `${monthData.month} Edition`;

                // Display topics
                const topicsGrid = document.getElementById('topics-grid');
                topicsGrid.innerHTML = monthData.items.map((item, index) => `
                    <div class="topic-card" style="animation-delay: ${index * 0.08}s">
                        <div class="topic-number">${index + 1}</div>
                        <div class="topic-body">
                            <h2 class="topic-title">${escapeHtml(item.title)}</h2>
                            <p class="topic-description">${escapeHtml(item.description)}</p>
                            <a href="${escapeHtml(item.url)}" 
                               class="topic-link" 
                               target="_blank" 
                               rel="noopener noreferrer">
                                Learn More
                            </a>
                        </div>
                    </div>
                `).join('');
            })
            .catch(error => {
                console.error('Error loading monthly items:', error);
                document.getElementById('topics-grid').innerHTML = `
                    <div class="error-message">
                        Unable to load monthly items. Please try again later.
                    </div>
                `;
            });
    </script>
</body>
</html>
